# Nginx Load Balancer Configuration
# This distributes traffic across 3 Next.js instances running in different campus locations
# Deploy on a central server or load balancer instance

upstream app_servers {
  # Define backend servers with health checks
  server 192.168.1.10:3000 weight=1 max_fails=3 fail_timeout=30s;    # Islamabad (Master region)
  server 192.168.2.10:3000 weight=1 max_fails=3 fail_timeout=30s;    # Karachi (Slave region)
  server 192.168.3.10:3000 weight=1 max_fails=3 fail_timeout=30s;    # Peshawar (Slave region)

  # Use least connections load balancing for better distribution
  least_conn;

  # Keep-alive connections to backend servers
  keepalive 32;
}

# HTTP to HTTPS redirect
server {
  listen 80;
  server_name dam-lab.university.edu www.dam-lab.university.edu;

  # Health check endpoint (for monitoring)
  location /health {
    access_log off;
    return 200 "load-balancer-ok\n";
    add_header Content-Type text/plain;
  }

  # Redirect all other traffic to HTTPS
  location / {
    return 301 https://$server_name$request_uri;
  }
}

# Main HTTPS server block
server {
  listen 443 ssl http2;
  server_name dam-lab.university.edu www.dam-lab.university.edu;

  # SSL Certificate configuration
  ssl_certificate /etc/ssl/certs/dam-lab.crt;
  ssl_certificate_key /etc/ssl/private/dam-lab.key;

  # SSL security settings
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  # Add security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "no-referrer-when-downgrade" always;
  add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css text/xml text/javascript
             application/x-javascript application/xml+rss
             application/javascript application/json;

  # Logging
  access_log /var/log/nginx/dam-lab-access.log combined;
  error_log /var/log/nginx/dam-lab-error.log warn;

  # Client upload size limit
  client_max_body_size 256M;

  # Main proxy configuration
  location / {
    proxy_pass http://app_servers;

    # Preserve original host and protocol
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    # Connection settings
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Buffering settings for better performance
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;

    # Keep-alive to backend
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # WebSocket support (for real-time features)
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  # Static assets caching (CSS, JS, images)
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    proxy_pass http://app_servers;
    proxy_cache_valid 30d;
    add_header Cache-Control "public, immutable, max-age=2592000";

    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # API endpoints with shorter cache
  location /api/ {
    proxy_pass http://app_servers;
    proxy_cache_valid 200 5m;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
  }

  # Health check endpoint
  location /health {
    access_log off;
    proxy_pass http://app_servers;
    proxy_connect_timeout 2s;
    proxy_read_timeout 2s;
  }
}

# Status endpoint (restrict to admin IPs)
server {
  listen 8080;
  server_name _;

  location /nginx-status {
    stub_status on;
    access_log off;
    allow 192.168.0.0/16;      # Internal network only
    allow 127.0.0.1;
    deny all;
  }
}
